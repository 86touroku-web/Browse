<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=0.95,maximum-scale=0.95,minimum-scale=0.95,user-scalable=no">
<title>ルアー在庫回覧</title>
<style>
/* ═══════════════════════════════════════════
   ★ GAS_URL を自分のデプロイURLに書き換えること
   ═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#f0f4f3;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;overflow:hidden;}
#wrap{position:relative;width:100%;max-width:480px;margin:0 auto;height:100vh;height:100dvh;overflow:hidden;}
#app{width:100%;height:100%;background:#f0f4f3;display:flex;flex-direction:column;}

/* ヘッダー */
#hdr{background:#1a5f4a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;}
#hdr-set{font-size:11px;padding:5px 12px;border-radius:13px;border:1.5px solid #fff;background:transparent;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
#hdr-set.on{background:#ffd400;color:#1a5f4a;border-color:#ffd400;}
#hdr-sub{position:absolute;left:50%;transform:translateX(-50%);color:#fff;font-size:15px;font-weight:700;white-space:nowrap;}
#hdr-c{color:#a0d4c4;font-size:12px;font-weight:600;}

/* ローディング */
#loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#loading p{font-size:13px;color:#444;font-weight:600;}
.spinner{width:36px;height:36px;border:4px solid #cde;border-top-color:#1a5f4a;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* リスト */
#list{flex:1;overflow-y:auto;padding:6px 6px 4px;display:none;}

/* グループ見出し */
.gh{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;margin:6px 0 3px;background:#fbf585;border-radius:9px;border:1.5px solid #1a5f4a;}
.gn{font-size:12px;font-weight:700;color:#1a5f4a;}
.gr{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:6px;}
.pu{font-size:11px;padding:3px 7px;border-radius:11px;background:#e8f5e9;color:#ff31d2;border:0.5px solid #1a5f4a;font-weight:700;white-space:nowrap;}
.pd{font-size:11px;padding:3px 7px;border-radius:11px;background:#e8f5e9;color:#000000;border:0.5px solid #1a5f4a;font-weight:700;white-space:nowrap;}
.pno{font-size:11px;padding:3px 7px;border-radius:11px;background:#e8f5e9;color:#1a5f4a;border:0.5px solid #1a5f4a;font-weight:700;white-space:nowrap;}
.gc{font-size:11px;color:#444;font-weight:600;}

/* カード */
.card{background:#fff;border-radius:9px;border:2px solid #1d24ed;margin-bottom:5px;overflow:hidden;}
/* カード全体レイアウト：左画像＋右テキストの横並び */
.card-body{display:flex;gap:0;}

/* 左：画像エリア */
.card-img-col{background:#ade3fa;padding:6px 6px 6px 7px;display:flex;align-items:center;flex-shrink:0;}
.cimg{border-radius:5px;border:1px solid #585858;display:flex;align-items:center;justify-content:center;color:#888;font-size:9px;font-weight:600;width:68px;height:80px;object-fit:cover;flex-shrink:0;}

/* 右：テキストエリア */
.card-right{background:#dff4fd;flex:1;display:flex;flex-direction:column;min-width:0;}

/* 上段：BC・ステータス・商品NO・連番・♡ */
.card-top{background:#ade3fa;padding:6px 8px 5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.r1{display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.bc{font-size:12px;color:#111;font-weight:700;white-space:nowrap;}
.st{font-size:11px;padding:3px 0;border-radius:8px;font-weight:700;color:#fff;min-width:48px;text-align:center;flex-shrink:0;}
.s0{background:#d07000;}.s1{background:#1a7a30;}.s2{background:#bb0000;}.s3{background:#0055bb;}.s4{background:#6600aa;}
.cno{font-size:11px;color:#111;font-weight:600;white-space:nowrap;}
.seq{font-size:10px;color:#333;font-weight:600;white-space:nowrap;flex-shrink:0;}
.fb{width:30px;height:30px;border-radius:7px;border:2px solid #ec1c24;background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#ec1c24;}
.fb.on{background:#fff;border-color:#ec1c24;color:#ec1c24;}

/* 下段：テキスト情報 */
.card-bot{background:#dff4fd;padding:6px 8px 7px;flex:1;}
.ci{font-size:11px;line-height:1.75;color:#111;}
.ci-row{display:flex;gap:0;}
.lb{color:#111;font-weight:700;text-align:right;min-width:46px;margin-right:5px;flex-shrink:0;}
.cv{color:#111;font-weight:500;}
.nt{color:#444;font-size:10px;font-weight:500;}

/* ボトム */
#bot{background:#fff;border-top:1px solid #ccc;padding:6px 6px 8px;flex-shrink:0;display:none;}

/* 絞り込み未選択時の案内 */
.emptyhint{padding:40px 20px;text-align:center;font-size:13px;color:#555;font-weight:600;line-height:1.8;}
#btns{display:grid;grid-template-columns:62px 1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;}
.bn{font-size:11px;padding:7px 2px;border-radius:7px;border:1px solid #888;background:#f0f0f0;color:#111;cursor:pointer;text-align:center;font-family:inherit;font-weight:600;}
.bn.pr{background:#1a5f4a;color:#fff;border-color:#1a5f4a;font-weight:700;}
.bn-clear{grid-row:span 2;font-size:13px;font-weight:800;border-radius:7px;border:1px solid #888;background:#f0f0f0;color:#111;cursor:pointer;font-family:inherit;line-height:1.3;}

/* オーバーレイ・パネル */
#ov{position:absolute;left:0;right:0;top:0;bottom:var(--bot-h,96px);background:rgba(0,0,0,.45);z-index:9;display:none;border-radius:14px 14px 0 0;}
#ov.op{display:block;}
#pn{position:absolute;bottom:var(--bot-h,96px);left:0;right:0;background:#fff;border-radius:14px 14px 0 0;transform:translateY(calc(100% + var(--bot-h,96px)));transition:transform .27s cubic-bezier(.32,.72,0,1);z-index:10;max-height:calc(100% - var(--bot-h,96px) - 14px);display:flex;flex-direction:column;}
#pn.op{transform:translateY(0);}
.ph{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 9px;border-bottom:1px solid #ccc;flex-shrink:0;}
.pt{font-size:14px;font-weight:700;color:#111;}
.pc{font-size:12px;color:#555;cursor:pointer;border:none;background:none;font-family:inherit;font-weight:600;}
.pl{overflow-y:auto;padding:6px 9px;flex:1;}
.sec-label{font-size:11px;color:#555;font-weight:700;padding:6px 2px 3px;border-bottom:1px solid #ddd;margin-bottom:4px;}
.pr2{display:flex;justify-content:space-between;align-items:center;padding:10px 11px;border-radius:8px;margin-bottom:3px;cursor:pointer;background:#f0f2f1;}
.pr2.sl{background:#e0f2fc;border:1.5px solid #1d24ed;}
.pr2 .pln{font-size:12px;color:#111;font-weight:600;}
.pr2.sl .pln{color:#0010cc;font-weight:800;}
.pr2 .plc{font-size:11px;color:#555;font-weight:600;}
.pr2.sl .plc{color:#0010cc;font-weight:700;}
#type-section{display:none;margin-top:8px;}
#type-section.show{display:block;}
.pf{padding:8px 9px 10px;border-top:1px solid #ccc;flex-shrink:0;}
.pok{width:100%;padding:12px;border-radius:9px;background:#1a5f4a;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* お気に入りポップアップ */
#fp{position:absolute;inset:12px 9px 90px;background:#fff;border-radius:11px;border:1px solid #aaa;z-index:20;display:none;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.2);}
#fp.op{display:flex;}
.fh{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:#f9555b;}
.fh-l{display:flex;align-items:center;gap:6px;}
.fh-heart{font-size:18px;color:#fefefe;line-height:1;}
.fh-t{font-size:14px;font-weight:700;color:#000000;}
.fh-r{display:flex;align-items:center;gap:10px;}
.fh-cnt{font-size:13px;font-weight:700;color:#000000;white-space:nowrap;}
.fx{font-size:22px;cursor:pointer;border:none;background:none;color:#000000;padding:0;line-height:1;font-weight:700;}
.fl2{flex:1;overflow-y:auto;padding:8px 9px;}
.fe{padding:22px;text-align:center;font-size:13px;color:#555;font-weight:600;}

/* お気に入りポップアップ内だけの専用配色（通常一覧には影響しない） */
#fp .gh{background:#fce4ec;border-color:#f825ab;}
#fp .gn{color:#1a5f4a;}
#fp .card{border-color:#1a5f4a;}
#fp .card-top,#fp .card-img-col{background:#fffba7;}
#fp .card-bot{background:#fdfbd6;}
#fp .bc,#fp .cno,#fp .lb,#fp .cv,#fp .nt{color:#1a5f4a;}

/* 推移分析ポップアップ */
#tp{position:absolute;inset:12px 9px 90px;background:#fff;border-radius:11px;border:1px solid #aaa;z-index:20;display:none;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.2);}
#tp.op{display:flex;}
.th{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:#ff8f3c;flex-shrink:0;}
.th-l{display:flex;align-items:center;gap:6px;}
.th-ico{font-size:16px;line-height:1;}
.th-t{font-size:14px;font-weight:700;color:#111;}
.tx{font-size:22px;cursor:pointer;border:none;background:none;color:#111;padding:0;line-height:1;font-weight:700;}
.tl2{flex:1;overflow:auto;padding:10px 8px;}
.tn{font-size:10px;color:#777;font-weight:600;padding:0 2px 8px;}
.ttbl{width:100%;border-collapse:collapse;margin-bottom:16px;}
.ttbl th{background:#283593;color:#fff;font-size:10px;font-weight:700;padding:5px 1px;border:1px solid #1a237e;white-space:nowrap;}
.ttbl td{border:1px solid #ddd;text-align:center;font-weight:700;padding:6px 1px;font-size:13px;white-space:nowrap;color:#111;}
.ttbl td.lbl{background:#f0f0f0;font-size:11px;font-weight:700;}
.ttbl tr.avgrow td{background:#fff3cd;color:#d84315;}
.ttbl td.chigh{background:#FFCDD0;}
.ttbl td.clow{background:#B5FDFA;}
.ttbl{border:1px solid #000;}
.te{padding:22px;text-align:center;font-size:13px;color:#555;font-weight:600;}
</style>
</head>
<body>
<div id="wrap">
<div id="app">
  <div id="hdr">
    <button id="hdr-set" onclick="toggleSet()">セット</button>
    <span id="hdr-sub">ルアー在庫回覧</span>
    <span id="hdr-c">読込中…</span>
  </div>

  <!-- ローディング画面 -->
  <div id="loading">
    <div class="spinner"></div>
    <p id="load-msg">在庫データを読み込み中…</p>
  </div>

  <!-- カードリスト（ロード後に表示） -->
  <div id="list"></div>

  <!-- ボトムコントロール（ロード後に表示） -->
  <div id="bot">
    <div id="btns">
      <button class="bn-clear" onclick="clrAll()">✕<br>クリア</button>
      <button class="bn" data-p="maker" onclick="openP('maker')">メーカー</button>
      <button class="bn" data-p="category" onclick="openP('category')">カテゴリー</button>
      <button class="bn" data-p="date" onclick="openP('date')">購入日</button>
      <button class="bn" onclick="openFav()">♡ お気に入り</button>
      <button class="bn" onclick="openTrend()">📊 推移分析</button>
      <button class="bn" data-p="status" onclick="openP('status')">ステータス</button>
    </div>
  </div>
</div>

<div id="ov" onclick="closeP()"></div>
<div id="pn">
  <div class="ph">
    <span class="pt" id="pt"></span>
    <button class="pc" onclick="closeP()">✕ 閉じる</button>
  </div>
  <div class="pl" id="pc"></div>
  <div class="pf"><button class="pok" id="pok">表示</button></div>
</div>

<div id="fp">
  <div class="fh">
    <div class="fh-l"><span class="fh-heart">♥</span><span class="fh-t">お気に入り</span></div>
    <div class="fh-r"><span class="fh-cnt" id="fcnt">0件</span><button class="fx" onclick="closeFav()">×</button></div>
  </div>
  <div class="fl2" id="fl"></div>
</div>

<div id="tp">
  <div class="th">
    <div class="th-l"><span class="th-ico">📊</span><span class="th-t" id="tp-title">推移分析</span></div>
    <button class="tx" onclick="closeTrend()">×</button>
  </div>
  <div class="tl2" id="tl">
    <div class="tn">※金額は万円単位（例：1.2＝12,000円）・利益率は%</div>
    <div class="te" id="tmsg" style="display:none;"></div>
    <table class="ttbl" id="ttbl1"></table>
    <table class="ttbl" id="ttbl2"></table>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ★ここを自分のGASデプロイURLに書き換える
// ═══════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvAowp-vFmPTpYxIYpcisSpJrxQXAWb7tDWQxTbt8qDKsRw7tWhm1SCTyv87NgxuJGqA/exec';

// ─────────────────────────────────────────────────────
//  状態変数
// ─────────────────────────────────────────────────────
let ALL_ITEMS   = [];   // 全商品データ（起動時1回だけ取得）
let CAT_TYPE    = {};   // カテゴリー→タイプマップ
let MAKERS      = [];   // メーカー一覧
// F: maker/status/date は複数選択(Set)。category/typeは単一選択(階層のため)。setは真偽値。
let F = {maker:new Set(), category:null, type:null, date:new Set(), status:new Set(), set:false};
let favs        = new Set();
let curP        = null;
let selCat      = null;
let selType     = null;
let selP        = null;   // 複数選択パネル編集中の一時Set
let curItems    = [];     // 複数選択パネル表示中のリスト（再描画用）
let TREND_DATA  = null;   // 推移分析ポップアップのデータ（初回取得後はキャッシュして再利用）

// ─────────────────────────────────────────────────────
//  購入日の「区間」判定
//  3ヶ月 ⊂ 6ヶ月 ⊂ 1年 ⊂ 1年6ヶ月 ⊂ 2年（各区間は排他的なバンド）
// ─────────────────────────────────────────────────────
function bandForMonths(m) {
  if (m === null || m === undefined || m < 3)  return null;
  if (m < 6)  return '3ヶ月';
  if (m < 12) return '6ヶ月';
  if (m < 18) return '1年';
  if (m < 24) return '1年6ヶ月';
  return '2年';
}
const DATE_BANDS = ['3ヶ月','6ヶ月','1年','1年6ヶ月','2年'];

// ─────────────────────────────────────────────────────
//  お気に入りをlocalStorageに保存・復元
// ─────────────────────────────────────────────────────
function loadFavs(){
  try {
    const saved = localStorage.getItem('lure_favs');
    if (saved) favs = new Set(JSON.parse(saved));
  } catch(e){}
}
function saveFavs(){
  try { localStorage.setItem('lure_favs', JSON.stringify([...favs])); } catch(e){}
}

// ─────────────────────────────────────────────────────
//  JSONP通信（既存アプリと同じ方式）
// ─────────────────────────────────────────────────────
function gasCall(fn, payload, cb) {
  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    document.body.removeChild(script);
    cb(data);
  };
  const params = new URLSearchParams({
    fn       : fn,
    callback : cbName,
    payload  : JSON.stringify(payload || {}),
  });
  script.src = GAS_URL + '?' + params.toString();
  script.onerror = function() {
    delete window[cbName];
    document.body.removeChild(script);
    cb({ ok: false, error: '通信エラー' });
  };
  document.body.appendChild(script);
}

// ─────────────────────────────────────────────────────
//  起動時：全データ1回ダウンロード
// ─────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────
//  ボトムコントロールパネルの実高さを測定し、CSS変数に反映
//  （詳細選択パネル #pn / オーバーレイ #ov がこの高さの上で止まるようにする）
// ─────────────────────────────────────────────────────
function setBotHeight() {
  const h = document.getElementById('bot').offsetHeight;
  if (h > 0) document.getElementById('wrap').style.setProperty('--bot-h', h + 'px');
}

function init() {
  loadFavs();
  setMsg('商品データを読み込み中…');
  gasCall('getAllProducts', {}, function(res) {
    if (!res.ok) {
      setMsg('❌ データ取得に失敗しました: ' + (res.error || ''));
      return;
    }
    ALL_ITEMS = res.items || [];
    // 購入日の区間（バンド）を商品ごとに事前計算
    ALL_ITEMS.forEach(p => { p.band = bandForMonths(p.elapsedMonths); });
    setMsg('マスタを読み込み中…');
    gasCall('getMastersBrowse', {}, function(res2) {
      if (res2.ok) {
        MAKERS = res2.makers || [];
        // CAT_TYPEマップを構築
        (res2.categories || []).forEach(c => {
          CAT_TYPE[c.name] = c.types.map(t => ({name:t.name, cnt:t.cnt}));
        });
      }
      // ローディング非表示、UI表示
      document.getElementById('loading').style.display = 'none';
      document.getElementById('list').style.display    = 'block';
      document.getElementById('bot').style.display      = 'block';
      // ボトムバーの実高さを測定し、詳細パネルがそこに重ならないようCSS変数に反映
      setBotHeight();
      window.addEventListener('resize', setBotHeight);
      // 起動時は絞り込み未選択＝商品を表示しない（render内で案内表示になる）
      updFilterBtns();
      updHeaderSet();
      render();
    });
  });
}

function setMsg(msg) {
  document.getElementById('load-msg').textContent = msg;
}

// ─────────────────────────────────────────────────────
//  フィルタリング
// ─────────────────────────────────────────────────────
const SC = {'在庫':'s0','No有':'s1','出品':'s2','検品済':'s3','出タイ待':'s4','保品':'s3'};

// ─────────────────────────────────────────────────────
//  フィルタリング（共通判定関数）
//  ov: 一時的に上書きしたい項目があれば渡す（パネルでの件数プレビュー用）
//  maker/status/date は Set。空Set＝フィルター無し。
// ─────────────────────────────────────────────────────
function passesFilters(p, ov) {
  ov = ov || {};
  const maker    = ov.maker    !== undefined ? ov.maker    : F.maker;
  const category = ov.category !== undefined ? ov.category : F.category;
  const type     = ov.type     !== undefined ? ov.type     : F.type;
  const status   = ov.status   !== undefined ? ov.status   : F.status;
  const date     = ov.date     !== undefined ? ov.date     : F.date;
  const set      = ov.set      !== undefined ? ov.set      : F.set;

  if (maker.size    && !maker.has(p.maker))    return false;
  if (category       && p.cat  !== category)   return false;
  if (type            && p.type !== type)       return false;
  if (status.size    && !status.has(p.status)) return false;
  if (set             && !p.isSet)              return false;
  if (date.size) {
    if (!p.band || !date.has(p.band)) return false;
  }
  return true;
}

// 何かひとつでも絞り込み条件が選ばれているか
function anyFilterActive() {
  return F.maker.size > 0 || !!F.category || !!F.type ||
         F.status.size > 0 || F.date.size > 0 || F.set;
}

function gf() {
  return ALL_ITEMS.filter(p => passesFilters(p, {}));
}

// ─────────────────────────────────────────────────────
//  利益率バッジ
// ─────────────────────────────────────────────────────
function pbadge(p) {
  // タイプ平均がない場合はバッジ非表示
  if (p.profitType === null) return '';

  // 販売実績なし（個別利益率がnull）→ グリーン固定・ハイフン表示
  if (p.profitName === null) {
    return `<span class="pno">- vs 平均${p.profitType.toFixed(1)}%</span>`;
  }

  // 販売実績あり → 個別と平均を比較してカラー動的変化
  const d  = p.profitName - p.profitType;
  const up = d >= 0;
  const ar = up ? '↑' : '↓';
  const cl = up ? 'pu' : 'pd';
  return `<span class="${cl}">${p.profitName.toFixed(1)}%${ar} vs 平均${p.profitType.toFixed(1)}%</span>`;
}

// ─────────────────────────────────────────────────────
//  ヘッダー更新
// ─────────────────────────────────────────────────────
function updHeader() {
  const sub = document.getElementById('hdr-sub');
  if      (F.type)     sub.textContent = F.type;
  else if (F.category) sub.textContent = F.category;
  else                 sub.textContent = 'ルアー在庫回覧';
}

// ─────────────────────────────────────────────────────
//  カードレンダリング
// ─────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('list');

  // 絞り込み条件が何も選ばれていない場合は商品を一切表示しない
  if (!anyFilterActive()) {
    document.getElementById('hdr-c').textContent = '';
    document.getElementById('hdr-sub').textContent = 'ルアー在庫回覧';
    el.innerHTML = '<div class="emptyhint">🔍 下の「絞り込み」から条件を選んでください<br>（メーカー・カテゴリー・購入日・ステータス・セット）</div>';
    return;
  }

  const list = gf();
  document.getElementById('hdr-c').textContent = list.length + '件表示中';
  updHeader();
  if (!list.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:#444;font-weight:600;">該当商品がありません</div>';
    return;
  }
  // メーカー→商品名グループでソート
  list.sort((a, b) => {
    if (a.maker !== b.maker) return a.maker.localeCompare(b.maker, 'ja');
    return a.name.localeCompare(b.name, 'ja');
  });
  const grps = {};
  list.forEach(p => {
    if (!grps[p.name]) grps[p.name] = [];
    grps[p.name].push(p);
  });
  let h = '';
  Object.entries(grps).forEach(([nm, its]) => {
    const s = its[0];
    const badge = pbadge(s);
    h += `<div class="gh">
      <span class="gn">${esc(nm)}</span>
      <div class="gr">${badge}<span class="gc">${its.length}件</span></div>
    </div>`;
    let sq = 0;  // グループ単位でリセット
    its.forEach(p => {
      sq++;
      const fv  = favs.has(p.bc);
      const img = p.imgUrl
        ? `<img class="cimg" src="${esc(p.imgUrl)}" loading="lazy" alt="商品画像">`
        : `<div class="cimg">画像なし</div>`;
      // 状態行：condが空欄の場合は状態値を空で表示
      const condTxt = p.cond ? `<b>${esc(p.cond)}</b>` : '';
      // 購入金額・経過月を状態と同じ行に1行まとめ
      const priceTxt = `購入金額 ¥${Number(p.buyPrice||0).toLocaleString()}`;
      const elapseTxt = p.elapsedMonths !== null ? `${p.elapsedMonths}ヶ月経過` : '';
      h += `<div class="card">
        <div class="card-body">
          <div class="card-img-col">${img}</div>
          <div class="card-right">
            <div class="card-top">
              <div class="r1">
                <span class="bc">BC ${esc(p.bc)}</span>
                <span class="st ${SC[p.status]||'s3'}">${esc(p.status)}</span>
                <span class="cno">商品NO ${esc(String(p.no))}</span>
              </div>
              <span class="seq">${sq}/${its.length}</span>
              <button class="fb ${fv?'on':''}" onclick="tgFav('${p.bc}')">${fv?'♥':'♡'}</button>
            </div>
            <div class="card-bot">
              <div class="ci">
                <div class="ci-row"><span class="lb">保管BC</span><span class="cv">${esc(p.storBC)}</span></div>
                <div class="ci-row"><span class="lb">備考</span><span class="nt">${esc(p.note)}</span></div>
                <div class="ci-row"><span class="lb">状態</span><span class="cv">${condTxt}&nbsp;&nbsp;${priceTxt}&nbsp;&nbsp;${elapseTxt}</span></div>
              </div>
              <a href="https://86touroku-web.github.io/lure-app/?bc=${encodeURIComponent(p.bc)}" style="display:block;margin:6px 0 2px;padding:6px;background:linear-gradient(90deg,#e91e8c,#f72386);color:#fff;border-radius:7px;text-align:center;font-size:11px;font-weight:800;text-decoration:none;box-shadow:0 2px 6px rgba(0,0,0,.2);">✏️ 編集</a>
            </div>
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML = h;
}

// XSS対策
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────
//  お気に入り
// ─────────────────────────────────────────────────────
function tgFav(bc) {
  favs.has(bc) ? favs.delete(bc) : favs.add(bc);
  saveFavs();
  render();
}

// ─────────────────────────────────────────────────────
//  ボトムボタン状態更新（選択中の値・件数を表示）
// ─────────────────────────────────────────────────────
const BTN_LABEL = {maker:'メーカー', category:'カテゴリー', date:'購入日', status:'ステータス'};

function updFilterBtns() {
  document.querySelectorAll('#btns .bn[data-p]').forEach(btn => {
    const p = btn.dataset.p;
    let active = false;
    let text   = BTN_LABEL[p];

    if (p === 'category') {
      active = !!(F.category || F.type);
      text   = F.type || F.category || BTN_LABEL[p];
    } else {
      // maker / status / date は Set
      const n = F[p].size;
      active = n > 0;
      if      (n === 1) text = [...F[p]][0];
      else if (n > 1)   text = `${BTN_LABEL[p]}(${n})`;
    }

    btn.classList.toggle('pr', active);
    btn.textContent = text;
  });
}

// セット：ヘッダー左の専用ボタンで即時トグル（パネルは開かない）
function toggleSet() {
  F.set = !F.set;
  updHeaderSet();
  render();
}
function updHeaderSet() {
  document.getElementById('hdr-set').classList.toggle('on', F.set);
}

// ─────────────────────────────────────────────────────
//  カテゴリーパネル構築
// ─────────────────────────────────────────────────────
function buildCategoryPanel(init) {
  if (init) { selCat = F.category; selType = F.type; }
  document.getElementById('pt').textContent = 'カテゴリー・タイプ';
  const cats = Object.keys(CAT_TYPE);
  let h = '<div class="sec-label">カテゴリーを選択</div>';
  const curAll = !selCat;
  // 「全カテゴリー」件数＝現在有効な他フィルター(メーカー等)のみを反映した件数
  const allCnt = ALL_ITEMS.filter(p => passesFilters(p, {category:null, type:null})).length;
  h += `<div class="pr2 ${curAll?'sl':''}" onclick="selCatItem('__ALL__')"><span class="pln">全カテゴリー</span><span class="plc">(${allCnt})</span></div>`;
  cats.forEach(cat => {
    // 他フィルターと組み合わせた実件数。0件のカテゴリーは表示しない
    const cnt = ALL_ITEMS.filter(p => passesFilters(p, {category:cat, type:null})).length;
    if (cnt === 0) return;
    const cur = selCat === cat;
    h += `<div class="pr2 ${cur?'sl':''}" onclick="selCatItem('${cat}')"><span class="pln">${esc(cat)}</span><span class="plc">(${cnt})</span></div>`;
  });
  // タイプセクション（カテゴリー選択後に展開）
  const types  = selCat ? (CAT_TYPE[selCat] || []) : [];
  const showTs = selCat && types.length > 0;
  h += `<div id="type-section" class="${showTs?'show':''}">`;
  if (showTs) {
    const catCnt = ALL_ITEMS.filter(p => passesFilters(p, {category:selCat, type:null})).length;
    h += `<div class="sec-label" style="margin-top:6px;">▼ ${esc(selCat)} のタイプ</div>`;
    h += `<div class="pr2 ${!selType?'sl':''}" onclick="selTypeItem('__ALL__')"><span class="pln">全${esc(selCat)}</span><span class="plc">(${catCnt})</span></div>`;
    types.forEach(t => {
      // 他フィルターと組み合わせた実件数。0件のタイプは表示しない
      const cnt = ALL_ITEMS.filter(p => passesFilters(p, {category:selCat, type:t.name})).length;
      if (cnt === 0) return;
      const cur = selType === t.name;
      h += `<div class="pr2 ${cur?'sl':''}" onclick="selTypeItem('${esc(t.name)}')"><span class="pln">${esc(t.name)}</span><span class="plc">(${cnt})</span></div>`;
    });
  }
  h += '</div>';
  document.getElementById('pc').innerHTML = h;
  updPanelBtn();
}

function selCatItem(cat) {
  selCat  = (cat === '__ALL__') ? null : cat;
  selType = null;
  buildCategoryPanel(false);
}

function selTypeItem(tp) {
  selType = (tp === '__ALL__') ? null : tp;
  document.querySelectorAll('#type-section .pr2').forEach(r => {
    const nm = r.querySelector('.pln').textContent;
    r.classList.toggle('sl',
      nm.startsWith('全') ? !selType : selType === nm
    );
  });
  updPanelBtn();
}

function updPanelBtn() {
  const cnt = ALL_ITEMS.filter(p => passesFilters(p, {category: selCat, type: selType})).length;
  document.getElementById('pok').textContent = `${cnt}件を表示`;
}

// ─────────────────────────────────────────────────────
//  パネル開閉
// ─────────────────────────────────────────────────────
function openP(n) {
  // パネルを開いたまま別のボタンに切り替える場合は、編集中の内容を先に確定保存する
  // （③「○○件を表示」のタップを省略しても選択内容が消えないようにする）
  if (document.getElementById('pn').classList.contains('op')) {
    commitCurPanel();
    updFilterBtns();
  }
  curP = n;
  if (n === 'category') {
    buildCategoryPanel(true);
    document.getElementById('pn').classList.add('op');
    document.getElementById('ov').classList.add('op');
    return;
  }
  // メーカー・購入日・ステータス＝複数選択パネル
  openMultiPanel(n);
}

// ─────────────────────────────────────────────────────
//  複数選択パネル（メーカー／購入日／ステータス共通）
// ─────────────────────────────────────────────────────
function openMultiPanel(n) {
  selP = new Set(F[n]);  // 確定済みの選択をコピーして編集開始

  const titles = { maker:'メーカー', date:'購入日', status:'ステータス' };
  document.getElementById('pt').textContent = titles[n] || n;

  // 他の有効なフィルター(カテゴリー等)と組み合わせた実件数を、選択肢ごとに算出
  const countFor = (name) => ALL_ITEMS.filter(p => passesFilters(p, { [n]: new Set([name]) })).length;

  if (n === 'maker') {
    curItems = MAKERS.map(m => ({ name: m.name, cnt: countFor(m.name) }));
  } else if (n === 'date') {
    curItems = DATE_BANDS.map(v => ({ name: v, cnt: countFor(v) }));
  } else if (n === 'status') {
    curItems = ['在庫','検品済','保品','No有','出タイ待','出品'].map(v => ({ name: v, cnt: countFor(v) }));
  }
  // 該当商品が無い(0件)選択肢は非表示。ただし既に選択中のものは残す（解除しやすくするため）
  curItems = curItems.filter(it => it.cnt > 0 || selP.has(it.name));

  renderMultiList();
  document.getElementById('pn').classList.add('op');
  document.getElementById('ov').classList.add('op');
}

function renderMultiList() {
  let h = '';
  curItems.forEach(it => {
    const checked = selP.has(it.name);
    h += `<div class="pr2 ${checked?'sl':''}" onclick="toggleMulti('${esc(it.name)}')">
      <span class="pln">${checked?'☑':'☐'}　${esc(it.name)}</span>
      <span class="plc">(${it.cnt})</span>
    </div>`;
  });
  document.getElementById('pc').innerHTML = h;
  updMultiBtn();
}

function toggleMulti(name) {
  if (selP.has(name)) selP.delete(name);
  else                 selP.add(name);
  renderMultiList();
}

function updMultiBtn() {
  const cnt = ALL_ITEMS.filter(p => passesFilters(p, { [curP]: selP })).length;
  document.getElementById('pok').textContent = `${cnt}件を表示`;
}

// 編集中のパネル内容を F（確定データ）へ書き込む共通処理
// ・⑥「○○件を表示」ボタン押下時の確定
// ・別のチップへ切り替える際の自動確定（フローを止めないため）
// の両方から呼ばれる
function commitCurPanel() {
  if (curP === 'category') {
    F.category = selCat;
    F.type     = selType;
  } else if (curP === 'maker' || curP === 'date' || curP === 'status') {
    F[curP] = new Set(selP);
  }
}

document.getElementById('pok').addEventListener('click', () => {
  commitCurPanel();
  closeP(); updFilterBtns(); render();
});

function closeP() {
  document.getElementById('pn').classList.remove('op');
  document.getElementById('ov').classList.remove('op');
}
function clrAll() {
  F = {maker:new Set(), category:null, type:null, date:new Set(), status:new Set(), set:false};
  closeP();    // 絞り込みパネルが開いていれば閉じる
  closeFav();  // お気に入りポップアップが開いていれば閉じる
  closeTrend(); // 推移分析ポップアップが開いていれば閉じる
  updFilterBtns(); updHeaderSet(); render();
}

function openFav() {
  closeTrend(); // 推移分析が開いていれば閉じてから開く
  renderFavList();
  document.getElementById('fp').classList.add('op');
}
function closeFav() { document.getElementById('fp').classList.remove('op'); }

      const condTxt = p.cond ? `<b>${esc(p.cond)}</b>` : '';

      h += `<div class="card">
        <div class="card-body">

                <span class="st ${SC[p.status]||'s3'}">${esc(p.status)}</span>
                <span class="cno">商品NO ${esc(String(p.no))}</span>
              </div>
              <button class="fb on" onclick="removeFav('${p.bc}')">♥</button>
            </div>
            <div class="card-bot">
              <div class="ci">
                <div class="ci-row"><span class="lb">保管BC</span><span class="cv">${esc(p.storBC)}</span></div>
                <div class="ci-row"><span class="lb">備考</span><span class="nt">${esc(p.note)}</span></div>
                <div class="ci-row"><span class="lb">状態</span><span class="cv">${condTxt}&nbsp;&nbsp;${priceTxt}&nbsp;&nbsp;${elapseTxt}</span></div>
              </div>

          </div>
        </div>

    });
  });

}

// お気に入りポップアップ内で♡(♥)をタップ → 即お気に入り解除
function removeFav(bc) {
  favs.delete(bc);
  saveFavs();
  render();        // 通常一覧側の表示も更新
  renderFavList(); // お気に入りポップアップ側も更新
}

// ─────────────────────────────────────────────────────
//  推移分析ポップアップ
//  ・スプレッドシート「推移分析」シートの2表をそのまま参照
//  ・金額は万円単位（小数1桁）に変換、％はそのまま（既に整数）表示
//  ・備考・最終更新の列は升目には出さない（簡易版）
// ─────────────────────────────────────────────────────
function openTrend() {
  closeFav(); // お気に入りが開いていれば閉じてから開く
  document.getElementById('tp').classList.add('op');
  if (TREND_DATA) { renderTrend(); return; }
  showTrendMsg('読み込み中…');
  gasCall('getTrendAnalysisBrowse', {}, function(res) {
    if (!res.ok) {
      showTrendMsg('取得失敗：' + (res.error || ''));
      return;
    }
    TREND_DATA = res;
    renderTrend();
  });
}
function closeTrend() { document.getElementById('tp').classList.remove('op'); }

// 読込中・エラー時の文言表示（テーブル要素自体は消さず、文言欄だけ切替）
function showTrendMsg(msg) {
  const m = document.getElementById('tmsg');
  m.textContent = msg;
  m.style.display = 'block';
  document.getElementById('ttbl1').innerHTML = '';
  document.getElementById('ttbl2').innerHTML = '';
}

// 金額→万円単位（小数1桁）。空欄はそのまま空欄。
function fmtMan(v) {
  if (v === '' || v === null || v === undefined) return '';
  const n = Number(v);
  if (isNaN(n)) return '';
  return (n / 10000).toFixed(1);
}
// 件数・在庫数など整数値。空欄はそのまま空欄。
function fmtNum(v) {
  if (v === '' || v === null || v === undefined) return '';
  return String(v);
}
// 利益率専用："65%"のような文字列でも、0.65のような小数でもどちらでも整数%表示に統一
function fmtPct(v) {
  if (v === '' || v === null || v === undefined) return '';
  if (typeof v === 'string' && v.indexOf('%') !== -1) return v; // 既に"65%"形式ならそのまま
  const n = Number(v);
  if (isNaN(n)) return '';
  const pct = (n > 0 && n <= 1) ? n * 100 : n; // 0〜1の小数なら%に変換
  return Math.round(pct) + '%';
}

function renderTrend() {
  document.getElementById('tmsg').style.display = 'none';
  const d = TREND_DATA;
  document.getElementById('tp-title').textContent = d.title || '推移分析';

  // 月平均との比較で色クラスを返す（月列・月平均行・空欄は白）
  function cellCls(val, avg, isAvg, isLbl) {
    if (isAvg || isLbl) return '';
    if (val === '' || val === null || val === undefined) return '';
    if (avg === '' || avg === null || avg === undefined) return '';
    const v = Number(val), a = Number(avg);
    if (isNaN(v) || isNaN(a)) return '';
    if (v > a) return 'chigh';
    if (v < a) return 'clow';
    return '';
  }

  // 左テーブル（推移分析）：備考・最終更新の2列は升目には出さない
  const lh = ['月','純利益','落札数','出品数','購入額','購入数','在庫','利益率'];
  const leftRows = d.left.rows || [];
  // 月平均行（最終行）の生値を列ごとに取得
  const lavg = leftRows.length ? leftRows[leftRows.length - 1] : [];
  let h1 = '<tr>' + lh.map(x => `<th>${esc(x)}</th>`).join('') + '</tr>';
  leftRows.forEach(r => {
    const isAvg = r[0] === '月平均';
    const cells = [r[0], fmtMan(r[1]), fmtNum(r[2]), fmtNum(r[3]), fmtMan(r[4]), fmtNum(r[5]), fmtNum(r[6]), fmtPct(r[7])];
    // 比較は生値で行う（表示整形前の数値）
    const raws  = [r[0], r[1], r[2], r[3], r[4], r[5], r[6], r[7]];
    const avgs  = [lavg[0], lavg[1], lavg[2], lavg[3], lavg[4], lavg[5], lavg[6], lavg[7]];
    h1 += `<tr class="${isAvg ? 'avgrow' : ''}">` +
          cells.map((c, i) => {
            const isLbl = (i === 0);
            const cls   = [isLbl ? 'lbl' : '', cellCls(raws[i], avgs[i], isAvg, isLbl)].filter(Boolean).join(' ');
            return `<td class="${cls}">${esc(c)}</td>`;
          }).join('') +
          '</tr>';
  });
  document.getElementById('ttbl1').innerHTML = h1;

  // 右テーブル（タイプ別落札数）：全列そのまま整数表示
  const rh = d.right.header || [];
  const rightRows = d.right.rows || [];
  // 月平均行（最終行）の生値を列ごとに取得
  const ravg = rightRows.length ? rightRows[rightRows.length - 1] : [];
  let h2 = '<tr>' + rh.map(x => `<th>${esc(x)}</th>`).join('') + '</tr>';
  rightRows.forEach(r => {
    const isAvg = r[0] === '月平均';
    h2 += `<tr class="${isAvg ? 'avgrow' : ''}">` +
          r.map((c, i) => {
            const isLbl = (i === 0);
            const cls   = [isLbl ? 'lbl' : '', cellCls(c, ravg[i], isAvg, isLbl)].filter(Boolean).join(' ');
            return `<td class="${cls}">${esc(i === 0 ? c : fmtNum(c))}</td>`;
          }).join('') +
          '</tr>';
  });
  document.getElementById('ttbl2').innerHTML = h2;
}

// ─────────────────────────────────────────────────────
//  起動
// ─────────────────────────────────────────────────────
init();
</script>
